<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CyberTask — Personal Productivity Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700;800&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0B0F17;
    --bg2:      #0f1623;
    --bg3:      #141d2e;
    --bg4:      #1a2540;
    --bg5:      #1e2d4a;
    --cyan:     #00F5FF;
    --cyan2:    #00c4cc;
    --purple:   #A855F7;
    --purple2:  #7c3aed;
    --red:      #FF4455;
    --yellow:   #FFD700;
    --green:    #00FF88;
    --pink:     #F472B6;
    --blue:     #38BDF8;
    --orange:   #FB923C;
    --cyan-dim:    rgba(0,245,255,0.1);
    --purple-dim:  rgba(168,85,247,0.1);
    --red-dim:     rgba(255,68,85,0.1);
    --yellow-dim:  rgba(255,215,0,0.1);
    --green-dim:   rgba(0,255,136,0.1);
    --border:      rgba(0,245,255,0.12);
    --border2:     rgba(168,85,247,0.18);
    --border3:     rgba(255,255,255,0.06);
    --text:    #e2e8f0;
    --text2:   #94a3b8;
    --text3:   #4a5568;
    --text4:   #64748b;
    --shadow:  0 4px 24px rgba(0,0,0,0.5);
    --glow-cyan:   0 0 12px rgba(0,245,255,0.25);
    --glow-purple: 0 0 12px rgba(168,85,247,0.25);
    --font-head: 'Exo 2', sans-serif;
    --font-mono: 'Fira Code', monospace;
    --radius:  10px;
    --radius-lg: 14px;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-head);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  #root { position: relative; z-index: 1; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--purple2); border-radius: 3px; }

  /* ── Selection ── */
  ::selection { background: rgba(0,245,255,0.2); color: var(--cyan); }

  /* ── Layout ── */
  .app {
    max-width: 960px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 12px;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo {
    width: 48px; height: 48px;
    border: 2px solid var(--cyan);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono);
    font-size: 16px; font-weight: 700;
    color: var(--cyan);
    box-shadow: 0 0 18px rgba(0,245,255,0.35), inset 0 0 12px rgba(0,245,255,0.08);
    flex-shrink: 0;
    letter-spacing: 1px;
  }
  .app-title {
    font-family: 'Exo 2', sans-serif;
    font-size: 28px; font-weight: 800;
    background: linear-gradient(90deg, var(--cyan) 0%, var(--purple) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 4px;
    text-transform: uppercase;
    line-height: 1;
  }
  .app-sub {
    font-family: var(--font-mono);
    font-size: 10px;
    background: linear-gradient(90deg, var(--cyan), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 2px; margin-top: 4px;
    opacity: .7;
  }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .clock {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--cyan);
    letter-spacing: 1.5px;
    opacity: .75;
    border: 1px solid var(--border);
    padding: 5px 10px;
    border-radius: 6px;
    background: var(--bg2);
  }

  /* ── Button base ── */
  button { font-family: var(--font-head); cursor: pointer; border: none; outline: none; }
  button:focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; }

  .btn-primary {
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    color: #0B0F17;
    font-family: 'Exo 2', sans-serif;
    font-weight: 800; font-size: 13px;
    padding: 10px 20px; border-radius: var(--radius);
    display: flex; align-items: center; gap: 7px;
    letter-spacing: 2px; text-transform: uppercase;
    transition: opacity .15s, transform .1s, box-shadow .15s;
    white-space: nowrap;
    box-shadow: 0 0 16px rgba(0,245,255,0.2);
  }
  .btn-primary:hover { opacity: .88; box-shadow: 0 0 24px rgba(168,85,247,0.35); }
  .btn-primary:active { transform: scale(.97); }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--purple);
    font-family: var(--font-mono);
    font-size: 12px; padding: 7px 14px;
    border-radius: var(--radius);
    transition: background .15s, border-color .15s, color .15s, box-shadow .15s;
  }
  .btn-ghost:hover { background: var(--purple-dim); border-color: var(--purple); box-shadow: 0 0 10px rgba(168,85,247,0.2); }

  /* ── Stats Grid ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border3);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
    transition: border-color .2s, transform .15s, box-shadow .2s;
  }
  .stat-card:hover { transform: translateY(-2px); }
  .stat-card::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
  }
  .stat-card.total::after  { background: linear-gradient(90deg,var(--cyan),var(--blue)); box-shadow: 0 0 8px var(--cyan); }
  .stat-card.done::after   { background: linear-gradient(90deg,var(--green),var(--cyan)); }
  .stat-card.pending::after{ background: linear-gradient(90deg,var(--yellow),var(--orange)); }
  .stat-card.overdue::after{ background: linear-gradient(90deg,var(--red),var(--pink)); }
  .stat-card.rate::after   { background: linear-gradient(90deg,var(--purple),var(--pink)); }
  .stat-card.total:hover  { border-color: rgba(0,245,255,0.3);  box-shadow: 0 4px 20px rgba(0,245,255,0.1); }
  .stat-card.done:hover   { border-color: rgba(0,255,136,0.3);  box-shadow: 0 4px 20px rgba(0,255,136,0.1); }
  .stat-card.pending:hover{ border-color: rgba(255,215,0,0.3);  box-shadow: 0 4px 20px rgba(255,215,0,0.1); }
  .stat-card.overdue:hover{ border-color: rgba(255,68,85,0.3);  box-shadow: 0 4px 20px rgba(255,68,85,0.1); }
  .stat-card.rate:hover   { border-color: rgba(168,85,247,0.3); box-shadow: 0 4px 20px rgba(168,85,247,0.1); }
  .stat-label {
    font-family: var(--font-mono);
    font-size: 9px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .stat-card.total .stat-label  { color: var(--cyan); }
  .stat-card.done .stat-label   { color: var(--green); }
  .stat-card.pending .stat-label{ color: var(--yellow); }
  .stat-card.overdue .stat-label{ color: var(--red); }
  .stat-card.rate .stat-label   { color: var(--purple); }
  .stat-val {
    font-family: var(--font-mono);
    font-size: 30px; font-weight: 700; line-height: 1;
  }
  .stat-card.total .stat-val  { color: var(--cyan);   text-shadow: 0 0 12px rgba(0,245,255,0.5); }
  .stat-card.done .stat-val   { color: var(--green);  text-shadow: 0 0 12px rgba(0,255,136,0.5); }
  .stat-card.pending .stat-val{ color: var(--yellow); text-shadow: 0 0 12px rgba(255,215,0,0.5); }
  .stat-card.overdue .stat-val{ color: var(--red);    text-shadow: 0 0 12px rgba(255,68,85,0.5); }
  .stat-card.rate .stat-val   { color: var(--purple); text-shadow: 0 0 12px rgba(168,85,247,0.5); }
  .stat-icon {
    position: absolute; right: 12px; top: 12px;
    font-size: 24px; opacity: .1;
  }

  /* ── Progress bar ── */
  .progress-wrap {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 18px;
    margin-bottom: 24px;
    display: flex; align-items: center; gap: 16px;
  }
  .progress-label {
    font-family: var(--font-mono);
    font-size: 10px; font-weight: 600;
    color: var(--cyan);
    text-transform: uppercase; letter-spacing: 2px;
    white-space: nowrap;
    opacity: .8;
  }
  .progress-bar-bg {
    flex: 1; height: 8px;
    background: var(--bg4);
    border-radius: 4px; overflow: hidden;
    box-shadow: inset 0 0 6px rgba(0,0,0,0.4);
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--cyan), var(--purple));
    border-radius: 4px;
    transition: width .4s ease;
    box-shadow: 0 0 8px rgba(168,85,247,0.4);
  }
  .progress-pct {
    font-family: var(--font-mono);
    font-size: 14px; font-weight: 700;
    color: var(--purple);
    text-shadow: 0 0 10px rgba(168,85,247,0.5);
    min-width: 44px; text-align: right;
  }

  /* ── Form ── */
  .form-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: fadeIn .15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .form-card {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 28px;
    width: 100%; max-width: 560px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 30px rgba(168,85,247,0.1);
    animation: slideUp .2s ease;
    max-height: 90vh;
    overflow-y: auto;
  }
  .form-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 22px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border2);
  }
  .form-title-text {
    font-family: var(--font-mono);
    font-size: 13px; font-weight: 600;
    background: linear-gradient(90deg, var(--purple), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-transform: uppercase; letter-spacing: 2px;
  }
  .btn-close {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text3);
    width: 30px; height: 30px;
    border-radius: 6px;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: border-color .15s, color .15s;
  }
  .btn-close:hover { border-color: var(--red); color: var(--red); }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .form-full { grid-column: 1 / -1; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label {
    font-family: var(--font-mono);
    font-size: 10px; font-weight: 600;
    color: var(--cyan);
    text-transform: uppercase; letter-spacing: 1.5px;
    opacity: .8;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-head);
    font-size: 14px;
    padding: 10px 12px;
    border-radius: var(--radius);
    outline: none;
    width: 100%;
    transition: border-color .15s, box-shadow .15s;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    border-color: var(--purple);
    box-shadow: 0 0 10px rgba(168,85,247,0.15);
  }
  .form-group select { cursor: pointer; }
  .form-group select option { background: var(--bg3); }
  .form-group textarea { resize: vertical; min-height: 72px; line-height: 1.5; }
  .form-group input::placeholder,
  .form-group textarea::placeholder { color: var(--text3); }
  .err-msg {
    font-family: var(--font-mono);
    font-size: 10px; color: var(--red);
    margin-top: 2px; letter-spacing: .5px;
  }
  .form-actions {
    display: flex; justify-content: flex-end; gap: 10px;
    margin-top: 20px; padding-top: 18px;
    border-top: 1px solid var(--border);
  }
  .btn-save {
    background: linear-gradient(135deg, var(--purple), var(--purple2));
    color: #fff;
    font-family: 'Exo 2', sans-serif;
    font-weight: 700; font-size: 13px;
    padding: 10px 24px; border-radius: var(--radius);
    letter-spacing: 1.5px; text-transform: uppercase;
    transition: opacity .15s, transform .1s, box-shadow .15s;
    box-shadow: 0 0 14px rgba(168,85,247,0.3);
  }
  .btn-save:hover { opacity: .88; box-shadow: 0 0 22px rgba(168,85,247,0.5); }
  .btn-save:active { transform: scale(.97); }

  /* ── Toolbar ── */
  .toolbar {
    display: flex; gap: 10px; align-items: center;
    margin-bottom: 14px; flex-wrap: wrap;
  }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-icon {
    position: absolute; left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--cyan); font-size: 15px;
    pointer-events: none; opacity: .6;
  }
  .search-input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-head);
    font-size: 13px;
    padding: 10px 12px 10px 36px;
    border-radius: var(--radius);
    outline: none;
    transition: border-color .15s, box-shadow .15s;
    letter-spacing: .5px;
  }
  .search-input:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 12px rgba(0,245,255,0.12);
  }
  .search-input::placeholder { color: var(--text3); font-style: italic; }

  .sort-select {
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--purple);
    font-family: var(--font-mono);
    font-size: 11px; font-weight: 600;
    padding: 10px 12px;
    border-radius: var(--radius);
    outline: none; cursor: pointer;
    transition: border-color .15s, box-shadow .15s;
    white-space: nowrap;
    letter-spacing: .5px;
  }
  .sort-select:focus { border-color: var(--purple); box-shadow: 0 0 10px rgba(168,85,247,0.15); }
  .sort-select option { background: var(--bg2); color: var(--text); }

  /* ── Filter rows ── */
  .filter-section {
    margin-bottom: 16px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .filter-row {
    display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
  }
  .filter-label {
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 600;
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 2px;
    min-width: 62px;
    opacity: .7;
  }
  .filter-label.lbl-priority { color: var(--yellow); }
  .filter-label.lbl-category { color: var(--purple); }

  .chip {
    font-family: 'Exo 2', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    color: var(--text4);
    text-transform: uppercase;
    transition: all .18s ease;
    position: relative;
    overflow: hidden;
  }
  .chip:hover {
    color: var(--cyan);
    border-color: var(--cyan);
    background: var(--cyan-dim);
    box-shadow: 0 0 10px rgba(0,245,255,0.15);
    transform: translateY(-1px);
  }

  /* Status chips */
  .chip.active {
    background: var(--cyan-dim);
    border-color: var(--cyan);
    color: var(--cyan);
    box-shadow: 0 0 12px rgba(0,245,255,0.2), inset 0 0 8px rgba(0,245,255,0.05);
  }

  /* Priority chips — unique colors when active */
  .chip.active.p-high {
    background: var(--red-dim);
    border-color: var(--red);
    color: var(--red);
    box-shadow: 0 0 12px rgba(255,68,85,0.25), inset 0 0 8px rgba(255,68,85,0.05);
  }
  .chip.active.p-medium {
    background: var(--yellow-dim);
    border-color: var(--yellow);
    color: var(--yellow);
    box-shadow: 0 0 12px rgba(255,215,0,0.25), inset 0 0 8px rgba(255,215,0,0.05);
  }
  .chip.active.p-low {
    background: var(--cyan-dim);
    border-color: var(--cyan);
    color: var(--cyan);
    box-shadow: 0 0 12px rgba(0,245,255,0.25), inset 0 0 8px rgba(0,245,255,0.05);
  }

  /* Category chip colors when active */
  .chip.active.cat-work     { background:rgba(56,189,248,.12); border-color:#38bdf8; color:#38bdf8; box-shadow:0 0 12px rgba(56,189,248,.2); }
  .chip.active.cat-study    { background:rgba(168,85,247,.12); border-color:#a855f7; color:#a855f7; box-shadow:0 0 12px rgba(168,85,247,.2); }
  .chip.active.cat-personal { background:rgba(244,114,182,.12);border-color:#f472b6; color:#f472b6; box-shadow:0 0 12px rgba(244,114,182,.2); }
  .chip.active.cat-health   { background:rgba(0,255,136,.12);  border-color:#00ff88; color:#00ff88; box-shadow:0 0 12px rgba(0,255,136,.2); }
  .chip.active.cat-finance  { background:rgba(255,215,0,.12);  border-color:#ffd700; color:#ffd700; box-shadow:0 0 12px rgba(255,215,0,.2); }
  .chip.active.cat-other    { background:rgba(168,85,247,.12); border-color:#a855f7; color:#a855f7; box-shadow:0 0 12px rgba(168,85,247,.2); }

  /* ── Bulk row ── */
  .bulk-row {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius); padding: 10px 14px;
    margin-bottom: 14px;
  }
  .bulk-info {
    font-family: var(--font-mono);
    font-size: 11px; color: var(--purple); flex: 1;
  }
  .bulk-btn {
    background: transparent;
    font-family: var(--font-mono);
    font-size: 11px; padding: 5px 12px;
    border-radius: 6px; cursor: pointer;
    transition: background .15s;
    border: 1px solid;
  }
  .bulk-btn.complete { border-color: var(--green); color: var(--green); }
  .bulk-btn.complete:hover { background: var(--green-dim); }
  .bulk-btn.remove { border-color: var(--red); color: var(--red); }
  .bulk-btn.remove:hover { background: var(--red-dim); }
  .bulk-btn.clear { border-color: var(--yellow); color: var(--yellow); }
  .bulk-btn.clear:hover { background: var(--yellow-dim); }

  /* ── Select all ── */
  .select-all-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px;
  }
  .select-all-row label {
    font-family: var(--font-mono);
    font-size: 11px; color: var(--text4); cursor: pointer;
  }
  input[type="checkbox"] {
    accent-color: var(--purple);
    width: 14px; height: 14px; cursor: pointer;
  }

  /* ── Pinned ── */
  .task-card.pinned {
    border-color: rgba(255,215,0,0.35);
    background: linear-gradient(135deg, var(--bg2) 92%, rgba(255,215,0,0.04) 100%);
  }
  .task-card.pinned::after {
    content: '📌';
    position: absolute; top: 10px; right: 10px;
    font-size: 13px; opacity: .7;
    pointer-events: none;
  }
  .pin-section-label {
    font-family: var(--font-mono);
    font-size: 10px; color: var(--yellow);
    text-transform: uppercase; letter-spacing: 1.5px;
    margin-bottom: 8px; margin-top: 4px;
    display: flex; align-items: center; gap: 6px;
  }
  .pin-section-label::after {
    content: ''; flex: 1; height: 1px;
    background: rgba(255,215,0,.2);
  }

  /* ── Pomodoro ── */
  .pomo-bar {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 16px;
    flex-wrap: wrap;
  }
  .pomo-title {
    font-family: var(--font-mono);
    font-size: 11px; color: var(--purple);
    text-transform: uppercase; letter-spacing: 1px;
    white-space: nowrap;
  }
  .pomo-task-name {
    font-size: 12px; color: var(--text2);
    font-family: var(--font-mono);
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .pomo-display {
    font-family: var(--font-mono);
    font-size: 28px; font-weight: 700;
    color: var(--cyan);
    letter-spacing: 2px;
    min-width: 80px; text-align: center;
  }
  .pomo-display.break { color: var(--green); }
  .pomo-display.warning { color: var(--red); }
  .pomo-controls { display: flex; gap: 6px; align-items: center; }
  .pomo-btn {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text2);
    font-family: var(--font-mono);
    font-size: 11px; padding: 6px 12px;
    border-radius: 6px; cursor: pointer;
    transition: all .15s; white-space: nowrap;
  }
  .pomo-btn:hover { border-color: var(--purple); color: var(--purple); }
  .pomo-btn.running { border-color: var(--cyan); color: var(--cyan); }
  .pomo-btn.stop { border-color: var(--red); color: var(--red); }
  .pomo-btn.stop:hover { background: var(--red-dim); }
  .pomo-rounds {
    font-family: var(--font-mono);
    font-size: 10px; color: var(--text3);
    white-space: nowrap;
  }
  .pomo-mode-badge {
    font-family: var(--font-mono);
    font-size: 10px; padding: 3px 8px;
    border-radius: 20px; border: 1px solid;
    white-space: nowrap;
  }
  .pomo-mode-badge.focus { background: var(--cyan-dim); border-color: var(--cyan); color: var(--cyan); }
  .pomo-mode-badge.break { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .pomo-progress-bg {
    width: 100%; height: 3px;
    background: var(--bg4); border-radius: 2px;
    overflow: hidden; margin-top: 10px;
  }
  .pomo-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--cyan), var(--purple));
    border-radius: 2px;
    transition: width .5s linear;
  }

  /* ── Confetti canvas ── */
  #confetti-canvas {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 9999;
  }

  /* ── Task List ── */
  .task-list { display: flex; flex-direction: column; gap: 10px; }

  /* ── Task Card ── */
  .task-card {
    background: var(--bg2);
    border: 1px solid var(--border3);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    cursor: grab;
    transition: border-color .15s, background .15s, transform .1s;
    position: relative;
    overflow: hidden;
    animation: taskIn .2s ease;
  }
  @keyframes taskIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .task-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  }
  .task-card.p-high::before   { background: var(--red); }
  .task-card.p-medium::before { background: var(--yellow); }
  .task-card.p-low::before    { background: var(--cyan); }
  .task-card:hover { border-color: rgba(0,245,255,0.25); }
  .task-card.selected { background: var(--bg3); border-color: var(--purple); }
  .task-card.is-completed { opacity: .55; }
  .task-card.dragging { opacity: .4; border-color: var(--cyan); cursor: grabbing; }
  .task-card.drag-over { border-color: var(--purple); border-style: dashed; }

  .task-top { display: flex; align-items: flex-start; gap: 12px; }
  .task-checkbox-wrap { flex-shrink: 0; margin-top: 2px; }
  .task-checkbox {
    width: 20px; height: 20px;
    border: 2px solid var(--text3);
    border-radius: 5px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s; flex-shrink: 0;
  }
  .task-checkbox.checked {
    background: var(--green);
    border-color: var(--green);
  }
  .task-checkbox svg { display: none; }
  .task-checkbox.checked svg { display: block; }

  .task-body { flex: 1; min-width: 0; }
  .task-title {
    font-size: 15px; font-weight: 500;
    color: var(--text); line-height: 1.4;
    word-break: break-word;
    transition: color .15s;
  }
  .task-card.is-completed .task-title {
    text-decoration: line-through;
    color: var(--text3);
  }
  .task-desc {
    font-size: 12px; color: var(--text4);
    margin-top: 5px; line-height: 1.6;
  }
  .task-meta {
    display: flex; flex-wrap: wrap; gap: 6px;
    align-items: center; margin-top: 10px;
  }

  /* ── Badges ── */
  .badge {
    font-family: var(--font-mono);
    font-size: 10px; font-weight: 500;
    padding: 3px 9px; border-radius: 20px;
    border: 1px solid; letter-spacing: .5px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .badge.p-high   { background: var(--red-dim);    border-color: var(--red);    color: var(--red); }
  .badge.p-medium { background: var(--yellow-dim); border-color: var(--yellow); color: var(--yellow); }
  .badge.p-low    { background: var(--cyan-dim);   border-color: var(--cyan);   color: var(--cyan); }

  .badge.cat-work     { background: rgba(56,189,248,.1);  border-color: #38bdf8; color: #38bdf8; }
  .badge.cat-study    { background: rgba(168,85,247,.1);  border-color: #a855f7; color: #a855f7; }
  .badge.cat-personal { background: rgba(244,114,182,.1); border-color: #f472b6; color: #f472b6; }
  .badge.cat-health   { background: rgba(0,255,136,.1);   border-color: #00ff88; color: #00ff88; }
  .badge.cat-finance  { background: rgba(255,215,0,.1);   border-color: #ffd700; color: #ffd700; }
  .badge.cat-other    { background: rgba(255,255,255,.05);border-color: var(--text3); color: var(--text4); }

  .due-badge {
    font-family: var(--font-mono);
    font-size: 10px; padding: 3px 9px;
    border-radius: 20px; border: 1px solid;
    display: flex; align-items: center; gap: 4px;
    white-space: nowrap;
  }
  .due-future  { background: var(--green-dim);  border-color: var(--green);  color: var(--green); }
  .due-today   { background: var(--yellow-dim); border-color: var(--yellow); color: var(--yellow); }
  .due-overdue { background: var(--red-dim);    border-color: var(--red);    color: var(--red); }

  .done-time {
    font-family: var(--font-mono);
    font-size: 10px; color: var(--green);
    margin-left: auto;
    white-space: nowrap;
  }

  /* ── Task Actions ── */
  .task-actions {
    display: flex; gap: 4px; flex-shrink: 0;
    margin-left: 8px; align-items: flex-start;
    opacity: 0;
    transition: opacity .15s;
  }
  .task-card:hover .task-actions { opacity: 1; }
  .act-btn {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text3); font-size: 15px;
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .15s;
  }
  .act-btn:hover { background: var(--bg4); border-color: var(--border); }
  .act-btn.done-btn:hover { color: var(--green); border-color: var(--green); }
  .act-btn.edit-btn:hover { color: var(--cyan);  border-color: var(--cyan); }
  .act-btn.dup-btn:hover  { color: var(--purple); border-color: var(--purple); }
  .act-btn.del-btn:hover  { color: var(--red);  border-color: var(--red); }
  .act-btn.pin-btn:hover  { color: var(--yellow); border-color: var(--yellow); }
  .act-btn.pin-btn.pinned { color: var(--yellow); }

  /* ── Empty States ── */
  .empty {
    text-align: center;
    padding: 72px 20px;
    border: 1px dashed var(--border);
    border-radius: var(--radius-lg);
    background: var(--bg2);
  }
  .empty-icon {
    font-size: 52px; color: var(--text3);
    margin-bottom: 18px; display: block;
    opacity: .5;
  }
  .empty-title { font-size: 18px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
  .empty-sub {
    font-family: var(--font-mono);
    font-size: 12px; color: var(--text3);
  }

  /* ── Responsive ── */
  @media (max-width: 720px) {
    .stats-grid { grid-template-columns: repeat(3, 1fr); }
    .stat-card.overdue,
    .stat-card.rate { display: none; }
    .task-actions { opacity: 1; }
    .form-grid { grid-template-columns: 1fr; }
    .form-full { grid-column: 1; }
    .app-title { font-size: 20px; }
    .header { margin-bottom: 20px; }
  }
  @media (max-width: 480px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .stat-card.pending { display: none; }
    .app { padding: 16px 14px 50px; }
    .stat-val { font-size: 22px; }
    .btn-primary { padding: 8px 14px; font-size: 12px; }
  }

  /* ── Divider ── */
  .section-div {
    border: none;
    border-top: 1px solid var(--border3);
    margin: 18px 0;
  }

  /* ── Tooltip-like priority indicator on card ── */
  .task-card.p-high   { box-shadow: inset 3px 0 0 var(--red); }
  .task-card.p-medium { box-shadow: inset 3px 0 0 var(--yellow); }
  .task-card.p-low    { box-shadow: inset 3px 0 0 var(--cyan); }

  /* ── Subtasks ── */
  .subtask-list {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border3);
    display: flex; flex-direction: column; gap: 6px;
  }
  .subtask-item {
    display: flex; align-items: center; gap: 8px;
  }
  .subtask-cb {
    width: 14px; height: 14px;
    accent-color: var(--purple);
    cursor: pointer; flex-shrink: 0;
  }
  .subtask-text {
    font-size: 12px; color: var(--text2);
    font-family: var(--font-head);
    flex: 1;
  }
  .subtask-text.done {
    text-decoration: line-through;
    color: var(--text3);
  }
  .subtask-del {
    background: transparent; border: none;
    color: var(--text3); font-size: 12px;
    cursor: pointer; padding: 0 2px;
    opacity: 0; transition: opacity .15s, color .15s;
  }
  .subtask-item:hover .subtask-del { opacity: 1; }
  .subtask-del:hover { color: var(--red); }
  .subtask-progress {
    font-family: var(--font-mono);
    font-size: 10px; color: var(--purple);
    margin-top: 4px;
    letter-spacing: .5px;
  }
  .subtask-add-row {
    display: flex; gap: 6px; margin-top: 6px;
  }
  .subtask-add-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-head);
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 6px;
    outline: none;
    transition: border-color .15s;
  }
  .subtask-add-input:focus { border-color: var(--purple); }
  .subtask-add-input::placeholder { color: var(--text3); font-style: italic; }
  .subtask-add-btn {
    background: var(--purple-dim);
    border: 1px solid var(--border2);
    color: var(--purple);
    font-size: 12px; padding: 5px 10px;
    border-radius: 6px; cursor: pointer;
    transition: background .15s;
    white-space: nowrap;
    font-family: var(--font-mono);
  }
  .subtask-add-btn:hover { background: rgba(168,85,247,0.2); }
  .toggle-subtask-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text4);
    font-family: var(--font-mono);
    font-size: 10px; padding: 3px 8px;
    border-radius: 6px; cursor: pointer;
    margin-top: 6px;
    transition: all .15s;
  }
  .toggle-subtask-btn:hover { border-color: var(--purple); color: var(--purple); }

  /* ── AI Suggestions Modal ── */
  .ai-modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: fadeIn .15s ease;
  }
  .ai-modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 26px;
    width: 100%; max-width: 520px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 40px rgba(168,85,247,0.12);
    animation: slideUp .2s ease;
    max-height: 85vh;
    overflow-y: auto;
  }
  .ai-modal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border2);
  }
  .ai-modal-title {
    font-family: var(--font-mono);
    font-size: 13px; font-weight: 600;
    background: linear-gradient(90deg, var(--purple), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-transform: uppercase; letter-spacing: 2px;
  }
  .ai-input-wrap { margin-bottom: 14px; }
  .ai-input-wrap label {
    font-family: var(--font-mono);
    font-size: 10px; color: var(--cyan);
    text-transform: uppercase; letter-spacing: 1.5px;
    display: block; margin-bottom: 6px; opacity: .8;
  }
  .ai-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-head);
    font-size: 14px;
    padding: 10px 12px;
    border-radius: var(--radius);
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .ai-input:focus { border-color: var(--purple); box-shadow: 0 0 10px rgba(168,85,247,0.15); }
  .ai-generate-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--purple), var(--cyan));
    color: #0B0F17;
    font-family: 'Exo 2', sans-serif;
    font-weight: 800; font-size: 13px;
    padding: 11px; border-radius: var(--radius);
    letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; transition: opacity .15s;
    margin-bottom: 16px;
  }
  .ai-generate-btn:hover { opacity: .88; }
  .ai-generate-btn:disabled { opacity: .5; cursor: not-allowed; }
  .ai-loading {
    text-align: center; padding: 20px;
    font-family: var(--font-mono);
    font-size: 12px; color: var(--purple);
    letter-spacing: 1px;
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .ai-suggestions-list { display: flex; flex-direction: column; gap: 8px; }
  .ai-suggestion-item {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex; align-items: flex-start; gap: 10px;
    transition: border-color .15s;
  }
  .ai-suggestion-item:hover { border-color: var(--purple); }
  .ai-sug-body { flex: 1; min-width: 0; }
  .ai-sug-title {
    font-size: 13px; font-weight: 600;
    color: var(--text); margin-bottom: 3px;
  }
  .ai-sug-meta {
    font-family: var(--font-mono);
    font-size: 10px; color: var(--text4);
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .ai-add-btn {
    background: var(--purple-dim);
    border: 1px solid var(--border2);
    color: var(--purple);
    font-family: var(--font-mono);
    font-size: 11px; padding: 5px 10px;
    border-radius: 6px; cursor: pointer;
    white-space: nowrap;
    transition: all .15s; flex-shrink: 0;
  }
  .ai-add-btn:hover { background: rgba(168,85,247,0.22); border-color: var(--purple); }
  .ai-add-btn.added { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .ai-error {
    background: var(--red-dim); border: 1px solid var(--red);
    border-radius: var(--radius); padding: 10px 14px;
    font-family: var(--font-mono); font-size: 11px; color: var(--red);
    margin-bottom: 12px;
  }

  /* scrollable form backdrop for mobile */
  @media (max-width: 600px) {
    .form-backdrop { align-items: flex-start; padding-top: 10px; }
    .form-card { max-height: 95vh; }
    .streak-dots { display: none; }
  }

  /* ── Streak Counter ── */
  .streak-bar {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 20px;
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 16px;
    flex-wrap: wrap;
  }
  .streak-main {
    display: flex; align-items: center; gap: 10px;
  }
  .streak-fire {
    font-size: 28px;
    filter: drop-shadow(0 0 6px rgba(255,165,0,0.6));
  }
  .streak-count {
    font-family: var(--font-mono);
    font-size: 30px; font-weight: 700;
    color: var(--yellow);
    text-shadow: 0 0 14px rgba(255,215,0,0.5);
    line-height: 1;
  }
  .streak-label {
    font-family: var(--font-mono);
    font-size: 10px; color: var(--yellow);
    text-transform: uppercase; letter-spacing: 1.5px;
    opacity: .7; margin-top: 2px;
  }
  .streak-divider {
    width: 1px; height: 36px;
    background: var(--border);
  }
  .streak-stats {
    display: flex; gap: 20px; flex-wrap: wrap;
  }
  .streak-stat { text-align: center; }
  .streak-stat-val {
    font-family: var(--font-mono);
    font-size: 16px; font-weight: 700;
    color: var(--cyan);
  }
  .streak-stat-lbl {
    font-family: var(--font-mono);
    font-size: 9px; color: var(--text3);
    text-transform: uppercase; letter-spacing: 1px;
    margin-top: 2px;
  }
  .streak-dots {
    display: flex; gap: 5px; align-items: center;
    flex-wrap: wrap; margin-left: auto;
  }
  .streak-dot {
    width: 10px; height: 10px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--bg3);
    transition: all .2s;
  }
  .streak-dot.active {
    background: var(--yellow);
    border-color: var(--yellow);
    box-shadow: 0 0 6px rgba(255,215,0,0.5);
  }
  .streak-dot.today-dot {
    border-color: var(--cyan);
  }

  /* ── History Modal ── */
  .history-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.82);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: fadeIn .15s ease;
  }
  .history-modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 26px;
    width: 100%; max-width: 620px;
    max-height: 88vh;
    overflow-y: auto;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 40px rgba(0,245,255,0.07);
    animation: slideUp .2s ease;
  }
  .history-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; padding-bottom: 14px;
    border-bottom: 1px solid var(--border2);
  }
  .history-title {
    font-family: var(--font-mono);
    font-size: 13px; font-weight: 600;
    background: linear-gradient(90deg, var(--cyan), var(--purple));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    text-transform: uppercase; letter-spacing: 2px;
  }
  .history-search {
    width: 100%;
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); font-family: var(--font-head);
    font-size: 13px; padding: 9px 12px;
    border-radius: var(--radius); outline: none; margin-bottom: 16px;
    transition: border-color .15s;
  }
  .history-search:focus { border-color: var(--cyan); }
  .history-search::placeholder { color: var(--text3); font-style: italic; }
  .history-summary-bar {
    display: flex; gap: 16px; flex-wrap: wrap;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px; margin-bottom: 18px;
    align-items: center;
  }
  .history-summary-val {
    font-family: var(--font-mono);
    font-size: 20px; font-weight: 700; color: var(--cyan);
    text-shadow: 0 0 10px rgba(0,245,255,0.4);
  }
  .history-summary-lbl {
    font-family: var(--font-mono);
    font-size: 9px; color: var(--text3);
    text-transform: uppercase; letter-spacing: 1px; margin-top: 2px;
  }
  .history-day-block {
    margin-bottom: 12px;
    border: 1px solid var(--border3);
    border-radius: var(--radius); overflow: hidden;
  }
  .history-day-header {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg3); padding: 10px 14px;
    cursor: pointer; transition: background .15s; user-select: none;
  }
  .history-day-header:hover { background: var(--bg4); }
  .history-day-left { display: flex; align-items: center; gap: 10px; }
  .history-day-date {
    font-family: var(--font-mono);
    font-size: 12px; font-weight: 600;

<body>
<canvas id="confetti-canvas"></canvas>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ─── Confetti ─── */
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const pieces = Array.from({length: 90}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height - canvas.height,
    r: Math.random() * 7 + 3,
    d: Math.random() * 70 + 10,
    color: ['#00F5FF','#A855F7','#00FF88','#FFD700','#FF4455','#F472B6'][Math.floor(Math.random()*6)],
    tilt: Math.random() * 10 - 10,
    tiltAngle: 0,
    tiltSpeed: Math.random() * 0.1 + 0.05,
  }));
  let frame;
  let elapsed = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.tiltAngle += p.tiltSpeed;
      p.y += (Math.cos(p.d) + 2);
      p.x += Math.sin(elapsed * 0.01) * 0.5;
      p.tilt = Math.sin(p.tiltAngle) * 12;
      ctx.beginPath();
      ctx.lineWidth = p.r;
      ctx.strokeStyle = p.color;
      ctx.moveTo(p.x + p.tilt + p.r / 2, p.y);
      ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
      ctx.stroke();
    });
    elapsed++;
    if (elapsed < 120) { frame = requestAnimationFrame(draw); }
    else { ctx.clearRect(0, 0, canvas.width, canvas.height); }
  }
  cancelAnimationFrame(frame);
  elapsed = 0;
  draw();
}

/* ─── Sound ─── */
let _audioCtx = null;

function getAudioCtx() {
  if (!_audioCtx) {
    try {
      _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {
      console.warn('AudioContext not supported');
      return null;
    }
  }
  return _audioCtx;
}

async function playCompleteSound() {
  try {
    const ctx = getAudioCtx();
    if (!ctx) return;
    if (ctx.state === 'suspended') await ctx.resume();

    const now = ctx.currentTime;
    const notes = [523.25, 659.25, 783.99, 1046.50];
    notes.forEach((freq, i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = now + i * 0.13;
      gain.gain.setValueAtTime(0.001, t);
      gain.gain.linearRampToValueAtTime(0.3, t + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc.start(t);
      osc.stop(t + 0.42);
    });
  } catch(e) { console.warn('Sound error:', e); }
}

async function playPomoDoneSound() {
  try {
    const ctx = getAudioCtx();
    if (!ctx) return;
    if (ctx.state === 'suspended') await ctx.resume();

    const now = ctx.currentTime;
    [440, 550, 660, 880].forEach((freq, i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const t = now + i * 0.15;
      gain.gain.setValueAtTime(0.001, t);
      gain.gain.linearRampToValueAtTime(0.25, t + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      osc.start(t);
      osc.stop(t + 0.52);
    });
  } catch(e) { console.warn('Sound error:', e); }
}

/* ─── Pomodoro Component ─── */
const POMO_FOCUS = 25 * 60;
const POMO_BREAK = 5 * 60;

function PomodoroBar({ tasks }) {
  const [running, setRunning]       = useState(false);
  const [mode, setMode]             = useState('focus');
  const [timeLeft, setTimeLeft]     = useState(POMO_FOCUS);
  const [rounds, setRounds]         = useState(0);
  const [activeTaskId, setActiveTaskId] = useState('');
  const intervalRef                 = useRef(null);
  const totalTime                   = mode === 'focus' ? POMO_FOCUS : POMO_BREAK;

  const activeTasks = tasks.filter(t => !t.completed);

  useEffect(() => {
    if (running) {
      intervalRef.current = setInterval(() => {
        setTimeLeft(t => {
          if (t <= 1) {
            clearInterval(intervalRef.current);
            setRunning(false);
            playPomoDoneSound();
            if (mode === 'focus') {
              setRounds(r => r + 1);
              setMode('break');
              setTimeLeft(POMO_BREAK);
            } else {
              setMode('focus');
              setTimeLeft(POMO_FOCUS);
            }
            return 0;
          }
          return t - 1;
        });
      }, 1000);
    } else {
      clearInterval(intervalRef.current);
    }
    return () => clearInterval(intervalRef.current);
  }, [running, mode]);

  function fmt(s) {
    return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  }

  function handleStart() {
    if (!running && timeLeft === 0) {
      setTimeLeft(mode === 'focus' ? POMO_FOCUS : POMO_BREAK);
    }
    setRunning(r => !r);
  }

  function handleReset() {
    setRunning(false);
    setTimeLeft(mode === 'focus' ? POMO_FOCUS : POMO_BREAK);
  }

  function handleSkip() {
    setRunning(false);
    if (mode === 'focus') { setMode('break'); setTimeLeft(POMO_BREAK); }
    else { setMode('focus'); setTimeLeft(POMO_FOCUS); setRounds(r => r + 1); }
  }

  const pct = Math.round(((totalTime - timeLeft) / totalTime) * 100);
  const activeTask = activeTasks.find(t => t.id === activeTaskId);
  const isWarning = mode === 'focus' && timeLeft <= 60 && running;

  return (
    <div className="pomo-bar" role="region" aria-label="Pomodoro Timer">
      <div style={{display:'flex',flexDirection:'column',gap:4,minWidth:0}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span className="pomo-title">⏱ Pomodoro</span>
          <span className={`pomo-mode-badge ${mode}`}>{mode === 'focus' ? 'Focus' : 'Break'}</span>
          <span className="pomo-rounds">{rounds} round{rounds !== 1 ? 's' : ''}</span>
        </div>
        {activeTask && <div className="pomo-task-name">📌 {activeTask.title}</div>}
      </div>

      <select
        value={activeTaskId}
        onChange={e => setActiveTaskId(e.target.value)}
        style={{background:'var(--bg3)',border:'1px solid var(--border)',color:'var(--text2)',fontFamily:'var(--font-mono)',fontSize:'11px',padding:'6px 10px',borderRadius:'6px',outline:'none',maxWidth:'180px'}}
        aria-label="Select task for pomodoro"
      >
        <option value="">— Select task —</option>
        {activeTasks.map(t => (
          <option key={t.id} value={t.id}>{t.title.slice(0,32)}{t.title.length>32?'…':''}</option>
        ))}
      </select>

      <div className={`pomo-display${mode==='break'?' break':''}${isWarning?' warning':''}`}>
        {fmt(timeLeft)}
      </div>

      <div style={{width:'100%',order:10}}>
        <div className="pomo-progress-bg">
          <div className="pomo-progress-fill" style={{width:`${pct}%`}} />
        </div>
      </div>

      <div className="pomo-controls">
        <button className={`pomo-btn ${running ? 'running' : ''}`} onClick={handleStart} aria-label={running ? 'Pause timer' : 'Start timer'}>
          {running ? '⏸ Pause' : '▶ Start'}
        </button>
        <button className="pomo-btn" onClick={handleReset} aria-label="Reset timer">↺ Reset</button>
        <button className="pomo-btn" onClick={handleSkip} aria-label="Skip to next phase">⏭ Skip</button>
      </div>
    </div>
  );
}

/* ─── Helpers ─── */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);

const PRIO_WEIGHT = { high: 3, medium: 2, low: 1 };

function isOverdue(t) {
  if (t.completed || !t.dueDate) return false;
  const dt = new Date(t.dueDate + (t.dueTime ? 'T' + t.dueTime : 'T23:59'));
  return dt < new Date();
}

function dueState(t) {
  if (!t.dueDate) return null;
  const dt = new Date(t.dueDate + (t.dueTime ? 'T' + t.dueTime : 'T23:59'));
  const now = new Date();
  const eod = new Date(); eod.setHours(23,59,59,999);
  if (dt < now) return 'overdue';
  if (dt <= eod) return 'today';
  return 'future';
}

function fmtDate(d, t) {
  if (!d) return '';
  const opts = { day: '2-digit', month: 'short' };
  const dt = new Date(d + (t ? 'T' + t : 'T00:00'));
  return dt.toLocaleDateString('en-GB', opts) + (t ? ' ' + t : '');
}

function fmtDone(ts) {
  return new Date(ts).toLocaleString('en-GB', {
    day: '2-digit', month: 'short',
    hour: '2-digit', minute: '2-digit'
  });
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

const SAMPLE_TASKS = [];

}

  useEffect(() => {
    const handler = e => { if (e.key === 'Escape') onClose(); };

    return () => window.removeEventListener('keydown', handler);
  }, [onClose]);

              <option value="">-- Select --</option>
              <option value="work">💼 Work</option>
              <option value="study">📚 Study</option>

        <div style={{textAlign:'center',marginTop:10}}>

/* ─── TaskCard ─── */
function TaskCard({ task, selected, onToggle, onEdit, onDup, onDelete, onSelect, onPin, onSubtaskUpdate, dragging, dragOver, onDragStart, onDragEnd, onDragOver, onDrop }) {

        </div>
      </div>
    </div>
  );
}

/* ─── Streak Counter ─── */
const LS_STREAK = 'cybertask_streak_v1';
function loadStreak() {
  try { const r = localStorage.getItem(LS_STREAK); if(r) return JSON.parse(r); } catch(e){}
  return { current: 0, best: 0, lastDate: null, history: [] };
}
function saveStreak(s) {
  try { localStorage.setItem(LS_STREAK, JSON.stringify(s)); } catch(e){}
}
function todayStr() { return new Date().toISOString().slice(0,10); }

function StreakCounter({ completedToday }) {
  const [streak, setStreak] = useState(() => loadStreak());

  useEffect(() => {
    const today = todayStr();
    const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
    if (completedToday > 0) {
      setStreak(prev => {
        if (prev.lastDate === today) return prev;
        const isConsecutive = prev.lastDate === yesterday;
        const next = {
          current: isConsecutive ? prev.current + 1 : 1,
          best: Math.max(prev.best, isConsecutive ? prev.current + 1 : 1),
          lastDate: today,
          history: [...(prev.history || []).slice(-13), today],
        };
        saveStreak(next);
        return next;
      });
    }
  }, [completedToday]);

  const today = todayStr();
  const last14 = Array.from({length:14}, (_,i) => {
    const d = new Date(Date.now() - (13-i)*86400000).toISOString().slice(0,10);
    return { date: d, active: (streak.history||[]).includes(d), isToday: d === today };
  });

  return (
    <div className="streak-bar" role="region" aria-label="Streak counter">
      <div className="streak-main">
        <span className="streak-fire">🔥</span>
        <div>
          <div className="streak-count">{streak.current}</div>
          <div className="streak-label">Day Streak</div>
        </div>
      </div>
      <div className="streak-divider" />
      <div className="streak-stats">
        <div className="streak-stat">
          <div className="streak-stat-val">{streak.best}</div>
          <div className="streak-stat-lbl">Best</div>
        </div>
        <div className="streak-stat">
          <div className="streak-stat-val">{completedToday}</div>
          <div className="streak-stat-lbl">Done Today</div>
        </div>
      </div>
      <div className="streak-dots" title="Last 14 days">
        {last14.map((d,i) => (
          <div key={i} className={`streak-dot${d.active?' active':''}${d.isToday?' today-dot':''}`} title={d.date} />
        ))}
      </div>
    </div>
  );
}

function getAISuggestions(prompt) {
  const lower = prompt.toLowerCase();
  for (const [keys, tasks] of Object.entries(AI_PLANS.keywords)) {
    const patterns = keys.split('|');
    if (patterns.some(p => lower.includes(p))) {
      return tasks;
    }
  }
  return AI_PLANS.default(prompt);
}

  const [added, setAdded]      = useState(new Set());
  const [loading, setLoading]  = useState(false);

  function generate() {
    if (!prompt.trim()) return;
    setLoading(true);
    setSugs([]);
    setAdded(new Set());
    setTimeout(() => {
      setSugs(getAISuggestions(prompt.trim()));
      setLoading(false);
    }, 600);
  }

  function addTask(sug) {
    onAddTask({ title: sug.title, desc: sug.desc, priority: sug.priority, category: sug.category, dueDate:'', dueTime:'' });

function SubtaskList({ taskId, subtasks, onUpdate }) {
  const [newText, setNewText] = useState('');
  const [expanded, setExpanded] = useState(false);

  const total = subtasks.length;
  const done  = subtasks.filter(s => s.done).length;

  function addSub() {
    if (!newText.trim()) return;
    onUpdate([...subtasks, { id: uid(), text: newText.trim(), done: false }]);
    setNewText('');
  }

  function toggleSub(id) {
    onUpdate(subtasks.map(s => s.id===id ? {...s, done:!s.done} : s));
  }

  function deleteSub(id) {
    onUpdate(subtasks.filter(s => s.id!==id));
  }

  return (
    <div>
      <button
        className="toggle-subtask-btn"
        onClick={e => { e.stopPropagation(); setExpanded(x=>!x); }}
      >
        {expanded ? '▴' : '▾'} Subtasks {total > 0 ? `(${done}/${total})` : ''}
      </button>

        <div className="subtask-list" onClick={e => e.stopPropagation()}>

/* ─── History Modal ─── */
function HistoryModal({ tasks, onClose }) {
  const [search, setSearch]   = useState('');
  const [openDays, setOpenDays] = useState(new Set());

  // Group completed tasks by date
  const completedTasks = tasks.filter(t => t.completed && t.completedAt);

  // Build date groups
  const grouped = useMemo(() => {
    const map = {};
    completedTasks.forEach(t => {
      const dateKey = new Date(t.completedAt).toISOString().slice(0,10);
      if (!map[dateKey]) map[dateKey] = [];
      map[dateKey].push(t);
    });
    // Sort dates newest first
    return Object.entries(map)
      .sort((a,b) => b[0].localeCompare(a[0]))
      .map(([date, items]) => ({
        date,
        items: items.sort((a,b) => b.completedAt - a.completedAt)
      }));
  }, [completedTasks]);

  // Filter by search
  const filtered = useMemo(() => {
    if (!search.trim()) return grouped;
    const q = search.toLowerCase();
    return grouped.map(g => ({
      ...g,
      items: g.items.filter(t =>
        t.title.toLowerCase().includes(q) ||
        t.category.toLowerCase().includes(q)
      )
    })).filter(g => g.items.length > 0);
  }, [grouped, search]);

  // Auto-open today and yesterday
  useEffect(() => {
    const today = todayStr();
    const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
    const toOpen = new Set();
    grouped.slice(0,2).forEach(g => {
      if (g.date === today || g.date === yesterday) toOpen.add(g.date);
    });
    if (toOpen.size === 0 && grouped.length > 0) toOpen.add(grouped[0].date);
    setOpenDays(toOpen);
  }, []);

  function toggleDay(date) {
    setOpenDays(s => {
      const n = new Set(s);
      if (n.has(date)) n.delete(date); else n.add(date);
      return n;
    });
  }

  function fmtDayLabel(dateStr) {
    const today = todayStr();
    const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
    if (dateStr === today) return { label: 'Today', cls: 'today-lbl' };
    if (dateStr === yesterday) return { label: 'Yesterday', cls: 'yesterday-lbl' };
    const d = new Date(dateStr);
    return {
      label: d.toLocaleDateString('en-GB', { weekday:'long', day:'2-digit', month:'long', year:'numeric' }),
      cls: ''
    };
  }

  function fmtTime(ts) {
    return new Date(ts).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
  }

  const totalDone  = completedTasks.length;
  const totalDays  = grouped.length;
  const bestDay    = grouped.reduce((max, g) => Math.max(max, g.items.length), 0);

  useEffect(() => {
    const h = e => { if(e.key==='Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [onClose]);

  return (
    <div className="history-backdrop" onClick={e => { if(e.target===e.currentTarget) onClose(); }}>
      <div className="history-modal" role="dialog" aria-modal="true" aria-label="Task History">
        <div className="history-header">
          <span className="history-title">📅 Completion History</span>
          <button className="btn-close" onClick={onClose} aria-label="Close">✕</button>
        </div>

        {/* ── Summary bar ── */}
        <div className="history-summary-bar">
          <div style={{textAlign:'center'}}>
            <div className="history-summary-val" style={{color:'var(--green)'}}>{totalDone}</div>
            <div className="history-summary-lbl">Total Done</div>
          </div>
          <div style={{width:'1px',background:'var(--border)',alignSelf:'stretch'}}/>
          <div style={{textAlign:'center'}}>
            <div className="history-summary-val" style={{color:'var(--cyan)'}}>{totalDays}</div>
            <div className="history-summary-lbl">Active Days</div>
          </div>
          <div style={{width:'1px',background:'var(--border)',alignSelf:'stretch'}}/>
          <div style={{textAlign:'center'}}>
            <div className="history-summary-val" style={{color:'var(--yellow)'}}>{bestDay}</div>
            <div className="history-summary-lbl">Best Day</div>
          </div>
          <div style={{width:'1px',background:'var(--border)',alignSelf:'stretch'}}/>
          <div style={{textAlign:'center'}}>
            <div className="history-summary-val" style={{color:'var(--purple)'}}>{totalDays > 0 ? (totalDone/totalDays).toFixed(1) : 0}</div>
            <div className="history-summary-lbl">Avg / Day</div>
          </div>
        </div>

        {/* ── Search ── */}
        <input
          className="history-search"
          type="text"
          placeholder="🔍  Search completed tasks..."
          value={search}
          onChange={e => setSearch(e.target.value)}
        />

        {/* ── Day groups ── */}
        {filtered.length === 0 ? (
          <div className="history-empty">
            {totalDone === 0
              ? '// No completed tasks yet\nComplete your first task to start your history!'
              : '// No tasks match your search'}
          </div>
        ) : (
          filtered.map(({ date, items }) => {
            const { label, cls } = fmtDayLabel(date);
            const isOpen = openDays.has(date);
            return (
              <div className="history-day-block" key={date}>
                <div className="history-day-header" onClick={() => toggleDay(date)}>
                  <div className="history-day-left">
                    <span className={`history-day-date ${cls}`}>{label}</span>
                    <span className="history-day-count">✓ {items.length} task{items.length!==1?'s':''}</span>
                  </div>
                  <span className={`history-day-arrow${isOpen?' open':''}`}>▼</span>
                </div>
                {isOpen && items.map(t => (
                  <div className="history-task-row" key={t.id}>
                    <span style={{fontSize:'14px',flexShrink:0,marginTop:'1px'}}>✅</span>
                    <div className="history-task-info">
                      <div className="history-task-title">{t.title}</div>
                      <div className="history-task-meta">
                        <span className={`badge p-${t.priority}`}>{t.priority}</span>
                        <span className={`badge cat-${t.category}`}>{t.category}</span>
                        {(t.subtasks||[]).length > 0 && (
                          <span style={{fontFamily:'var(--font-mono)',fontSize:'10px',color:'var(--text3)'}}>
                            {(t.subtasks||[]).filter(s=>s.done).length}/{(t.subtasks||[]).length} subtasks
                          </span>
                        )}
                      </div>
                    </div>
                    <span className="history-time">⏰ {fmtTime(t.completedAt)}</span>
                  </div>
                ))}
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}

/* ─── localStorage helpers ─── */
const LS_KEY = 'cybertask_v1_tasks';
const LS_HISTORY = 'cybertask_v1_history';

function loadTasks() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return [];
}
function saveTasks(tasks) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(tasks)); } catch(e) {}
}
function loadHistory() {
  try {
    const raw = localStorage.getItem(LS_HISTORY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return [];
}
function saveHistory(history) {
  try { localStorage.setItem(LS_HISTORY, JSON.stringify(history)); } catch(e) {}
}
