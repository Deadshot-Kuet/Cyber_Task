<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CyberTask — Personal Productivity Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700;800&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0B0F17;
    --bg2:      #0f1623;
    --bg3:      #141d2e;
    --bg4:      #1a2540;
    --bg5:      #1e2d4a;
    --cyan:     #00F5FF;
    --cyan2:    #00c4cc;
    --purple:   #A855F7;
    --purple2:  #7c3aed;
    --red:      #FF4455;
    --yellow:   #FFD700;
    --green:    #00FF88;
    --pink:     #F472B6;
    --blue:     #38BDF8;
    --orange:   #FB923C;
    --cyan-dim:    rgba(0,245,255,0.1);
    --purple-dim:  rgba(168,85,247,0.1);
    --red-dim:     rgba(255,68,85,0.1);
    --yellow-dim:  rgba(255,215,0,0.1);
    --green-dim:   rgba(0,255,136,0.1);
    --border:      rgba(0,245,255,0.12);
    --border2:     rgba(168,85,247,0.18);
    --border3:     rgba(255,255,255,0.06);
    --text:    #e2e8f0;
    --text2:   #94a3b8;
    --text3:   #4a5568;
    --text4:   #64748b;
    --shadow:  0 4px 24px rgba(0,0,0,0.5);
    --glow-cyan:   0 0 12px rgba(0,245,255,0.25);
    --glow-purple: 0 0 12px rgba(168,85,247,0.25);
    --font-head: 'Exo 2', sans-serif;
    --font-mono: 'Fira Code', monospace;
    --radius:  10px;
    --radius-lg: 14px;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-head);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  #root { position: relative; z-index: 1; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--purple2); border-radius: 3px; }

  /* ── Selection ── */
  ::selection { background: rgba(0,245,255,0.2); color: var(--cyan); }

  /* ── Layout ── */
  .app {
    max-width: 960px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 12px;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo {
    width: 44px; height: 44px;
    border: 2px solid var(--cyan);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono);
    font-size: 15px; font-weight: 700;
    color: var(--cyan);
    box-shadow: var(--glow-cyan);
    flex-shrink: 0;
  }
  .app-title {
    font-size: 26px; font-weight: 800;
    color: var(--cyan);
    letter-spacing: 3px;
    text-transform: uppercase;
    line-height: 1;
  }
  .app-sub {
    font-family: var(--font-mono);
    font-size: 10px; color: var(--text3);
    letter-spacing: 1.5px; margin-top: 3px;
  }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .clock {
    font-family: var(--font-mono);
    font-size: 12px; color: var(--text4);
    letter-spacing: 1px;
  }

  /* ── Button base ── */
  button { font-family: var(--font-head); cursor: pointer; border: none; outline: none; }
  button:focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; }

  .btn-primary {
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    color: #0B0F17;
    font-weight: 700; font-size: 13px;
    padding: 10px 20px; border-radius: var(--radius);
    display: flex; align-items: center; gap: 7px;
    letter-spacing: 1px; text-transform: uppercase;
    transition: opacity .15s, transform .1s;
    white-space: nowrap;
  }
  .btn-primary:hover { opacity: .88; }
  .btn-primary:active { transform: scale(.97); }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text2);
    font-size: 12px; padding: 7px 14px;
    border-radius: var(--radius);
    transition: background .15s, border-color .15s, color .15s;
  }
  .btn-ghost:hover { background: var(--bg3); border-color: var(--purple); color: var(--purple); }

  /* ── Stats Grid ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border3);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
    transition: border-color .2s;
  }
  .stat-card:hover { border-color: var(--border); }
  .stat-card::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
  }
  .stat-card.total::after  { background: var(--cyan); }
  .stat-card.done::after   { background: var(--green); }
  .stat-card.pending::after{ background: var(--yellow); }
  .stat-card.overdue::after{ background: var(--red); }
  .stat-card.rate::after   { background: var(--purple); }
  .stat-label {
    font-family: var(--font-mono);
    font-size: 10px; color: var(--text3);
    text-transform: uppercase; letter-spacing: 1.2px;
    margin-bottom: 8px;
  }
  .stat-val {
    font-family: var(--font-mono);
    font-size: 28px; font-weight: 700; line-height: 1;
  }
  .stat-card.total .stat-val  { color: var(--cyan); }
  .stat-card.done .stat-val   { color: var(--green); }
  .stat-card.pending .stat-val{ color: var(--yellow); }
  .stat-card.overdue .stat-val{ color: var(--red); }
  .stat-card.rate .stat-val   { color: var(--purple); }
  .stat-icon {
    position: absolute; right: 14px; top: 14px;
    font-size: 22px; opacity: .12;
  }

  /* ── Progress bar ── */
  .progress-wrap {
    background: var(--bg2);
    border: 1px solid var(--border3);
    border-radius: var(--radius-lg);
    padding: 14px 18px;
    margin-bottom: 24px;
    display: flex; align-items: center; gap: 16px;
  }
  .progress-label {
    font-family: var(--font-mono);
    font-size: 11px; color: var(--text4);
    text-transform: uppercase; letter-spacing: 1px;
    white-space: nowrap;
  }
  .progress-bar-bg {
    flex: 1; height: 6px;
    background: var(--bg4);
    border-radius: 3px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--cyan), var(--purple));
    border-radius: 3px;
    transition: width .4s ease;
  }
  .progress-pct {
    font-family: var(--font-mono);
    font-size: 13px; font-weight: 700;
    color: var(--purple);
    min-width: 40px; text-align: right;
  }

  /* ── Form ── */
  .form-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: fadeIn .15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .form-card {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 28px;
    width: 100%; max-width: 560px;
    box-shadow: var(--shadow);
    animation: slideUp .2s ease;
    max-height: 90vh;
    overflow-y: auto;
  }
  .form-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 22px;
  }
  .form-title-text {
    font-family: var(--font-mono);
    font-size: 13px; font-weight: 500;
    color: var(--purple);
    text-transform: uppercase; letter-spacing: 1.5px;
  }
  .btn-close {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text3);
    width: 30px; height: 30px;
    border-radius: 6px;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: border-color .15s, color .15s;
  }
  .btn-close:hover { border-color: var(--red); color: var(--red); }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .form-full { grid-column: 1 / -1; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label {
    font-family: var(--font-mono);
    font-size: 10px; color: var(--text4);
    text-transform: uppercase; letter-spacing: 1px;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-head);
    font-size: 14px;
    padding: 10px 12px;
    border-radius: var(--radius);
    outline: none;
    width: 100%;
    transition: border-color .15s;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--purple); }
  .form-group select { cursor: pointer; }
  .form-group select option { background: var(--bg3); }
  .form-group textarea { resize: vertical; min-height: 72px; line-height: 1.5; }
  .form-group input::placeholder,
  .form-group textarea::placeholder { color: var(--text3); }
  .err-msg {
    font-family: var(--font-mono);
    font-size: 10px; color: var(--red);
    margin-top: 2px;
  }
  .form-actions {
    display: flex; justify-content: flex-end; gap: 10px;
    margin-top: 20px; padding-top: 18px;
    border-top: 1px solid var(--border);
  }
  .btn-save {
    background: var(--purple);
    color: #fff;
    font-weight: 600; font-size: 13px;
    padding: 10px 24px; border-radius: var(--radius);
    letter-spacing: .5px;
    transition: background .15s, transform .1s;
  }
  .btn-save:hover { background: var(--purple2); }
  .btn-save:active { transform: scale(.97); }

  /* ── Toolbar ── */
  .toolbar {
    display: flex; gap: 10px; align-items: center;
    margin-bottom: 14px; flex-wrap: wrap;
  }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-icon {
    position: absolute; left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--text3); font-size: 15px;
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-head);
    font-size: 13px;
    padding: 10px 12px 10px 36px;
    border-radius: var(--radius);
    outline: none;
    transition: border-color .15s;
  }
  .search-input:focus { border-color: var(--cyan); }
  .search-input::placeholder { color: var(--text3); }

  .sort-select {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 10px 12px;
    border-radius: var(--radius);
    outline: none; cursor: pointer;
    transition: border-color .15s;
    white-space: nowrap;
  }
  .sort-select:focus { border-color: var(--cyan); }
  .sort-select option { background: var(--bg2); }

  /* ── Filter rows ── */
  .filter-section { margin-bottom: 14px; }
  .filter-row {
    display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
    margin-bottom: 8px;
  }
  .filter-label {
    font-family: var(--font-mono);
    font-size: 9px; color: var(--text3);
    text-transform: uppercase; letter-spacing: 1px;
    min-width: 54px;
  }
  .chip {
    background: var(--bg2);
    border: 1px solid var(--border3);
    color: var(--text4);
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 4px 12px; border-radius: 20px;
    cursor: pointer;
    transition: all .15s;
    letter-spacing: .5px;
  }
  .chip:hover { border-color: var(--cyan); color: var(--cyan); }
  .chip.active { background: var(--cyan-dim); border-color: var(--cyan); color: var(--cyan); }
  .chip.active.p-high { background: var(--red-dim); border-color: var(--red); color: var(--red); }
  .chip.active.p-medium { background: var(--yellow-dim); border-color: var(--yellow); color: var(--yellow); }
  .chip.active.p-low { background: var(--cyan-dim); border-color: var(--cyan); color: var(--cyan); }

  /* ── Bulk row ── */
  .bulk-row {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius); padding: 10px 14px;
    margin-bottom: 14px;
  }
  .bulk-info {
    font-family: var(--font-mono);
    font-size: 11px; color: var(--purple); flex: 1;
  }
  .bulk-btn {
    background: transparent;
    font-family: var(--font-mono);
    font-size: 11px; padding: 5px 12px;
    border-radius: 6px; cursor: pointer;
    transition: background .15s;
    border: 1px solid;
  }
  .bulk-btn.complete { border-color: var(--green); color: var(--green); }
  .bulk-btn.complete:hover { background: var(--green-dim); }
  .bulk-btn.remove { border-color: var(--red); color: var(--red); }
  .bulk-btn.remove:hover { background: var(--red-dim); }
  .bulk-btn.clear { border-color: var(--yellow); color: var(--yellow); }
  .bulk-btn.clear:hover { background: var(--yellow-dim); }

  /* ── Select all ── */
  .select-all-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px;
  }
  .select-all-row label {
    font-family: var(--font-mono);
    font-size: 11px; color: var(--text4); cursor: pointer;
  }
  input[type="checkbox"] {
    accent-color: var(--purple);
    width: 14px; height: 14px; cursor: pointer;
  }

  /* ── Pinned ── */
  .task-card.pinned {
    border-color: rgba(255,215,0,0.35);
    background: linear-gradient(135deg, var(--bg2) 92%, rgba(255,215,0,0.04) 100%);
  }
  .task-card.pinned::after {
    content: '📌';
    position: absolute; top: 10px; right: 10px;
    font-size: 13px; opacity: .7;
    pointer-events: none;
  }
  .pin-section-label {
    font-family: var(--font-mono);
    font-size: 10px; color: var(--yellow);
    text-transform: uppercase; letter-spacing: 1.5px;
    margin-bottom: 8px; margin-top: 4px;
    display: flex; align-items: center; gap: 6px;
  }
  .pin-section-label::after {
    content: ''; flex: 1; height: 1px;
    background: rgba(255,215,0,.2);
  }

  /* ── Pomodoro ── */
  .pomo-bar {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 16px;
    flex-wrap: wrap;
  }
  .pomo-title {
    font-family: var(--font-mono);
    font-size: 11px; color: var(--purple);
    text-transform: uppercase; letter-spacing: 1px;
    white-space: nowrap;
  }
  .pomo-task-name {
    font-size: 12px; color: var(--text2);
    font-family: var(--font-mono);
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .pomo-display {
    font-family: var(--font-mono);
    font-size: 28px; font-weight: 700;
    color: var(--cyan);
    letter-spacing: 2px;
    min-width: 80px; text-align: center;
  }
  .pomo-display.break { color: var(--green); }
  .pomo-display.warning { color: var(--red); }
  .pomo-controls { display: flex; gap: 6px; align-items: center; }
  .pomo-btn {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text2);
    font-family: var(--font-mono);
    font-size: 11px; padding: 6px 12px;
    border-radius: 6px; cursor: pointer;
    transition: all .15s; white-space: nowrap;
  }
  .pomo-btn:hover { border-color: var(--purple); color: var(--purple); }
  .pomo-btn.running { border-color: var(--cyan); color: var(--cyan); }
  .pomo-btn.stop { border-color: var(--red); color: var(--red); }
  .pomo-btn.stop:hover { background: var(--red-dim); }
  .pomo-rounds {
    font-family: var(--font-mono);
    font-size: 10px; color: var(--text3);
    white-space: nowrap;
  }
  .pomo-mode-badge {
    font-family: var(--font-mono);
    font-size: 10px; padding: 3px 8px;
    border-radius: 20px; border: 1px solid;
    white-space: nowrap;
  }
  .pomo-mode-badge.focus { background: var(--cyan-dim); border-color: var(--cyan); color: var(--cyan); }
  .pomo-mode-badge.break { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .pomo-progress-bg {
    width: 100%; height: 3px;
    background: var(--bg4); border-radius: 2px;
    overflow: hidden; margin-top: 10px;
  }
  .pomo-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--cyan), var(--purple));
    border-radius: 2px;
    transition: width .5s linear;
  }

  /* ── Confetti canvas ── */
  #confetti-canvas {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 9999;
  }

  /* ── Task List ── */
  .task-list { display: flex; flex-direction: column; gap: 10px; }

  /* ── Task Card ── */
  .task-card {
    background: var(--bg2);
    border: 1px solid var(--border3);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    cursor: grab;
    transition: border-color .15s, background .15s, transform .1s;
    position: relative;
    overflow: hidden;
    animation: taskIn .2s ease;
  }
  @keyframes taskIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .task-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  }
  .task-card.p-high::before   { background: var(--red); }
  .task-card.p-medium::before { background: var(--yellow); }
  .task-card.p-low::before    { background: var(--cyan); }
  .task-card:hover { border-color: rgba(0,245,255,0.25); }
  .task-card.selected { background: var(--bg3); border-color: var(--purple); }
  .task-card.is-completed { opacity: .55; }
  .task-card.dragging { opacity: .4; border-color: var(--cyan); cursor: grabbing; }
  .task-card.drag-over { border-color: var(--purple); border-style: dashed; }

  .task-top { display: flex; align-items: flex-start; gap: 12px; }
  .task-checkbox-wrap { flex-shrink: 0; margin-top: 2px; }
  .task-checkbox {
    width: 20px; height: 20px;
    border: 2px solid var(--text3);
    border-radius: 5px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s; flex-shrink: 0;
  }
  .task-checkbox.checked {
    background: var(--green);
    border-color: var(--green);
  }
  .task-checkbox svg { display: none; }
  .task-checkbox.checked svg { display: block; }

  .task-body { flex: 1; min-width: 0; }
  .task-title {
    font-size: 15px; font-weight: 500;
    color: var(--text); line-height: 1.4;
    word-break: break-word;
    transition: color .15s;
  }
  .task-card.is-completed .task-title {
    text-decoration: line-through;
    color: var(--text3);
  }
  .task-desc {
    font-size: 12px; color: var(--text4);
    margin-top: 5px; line-height: 1.6;
  }
  .task-meta {
    display: flex; flex-wrap: wrap; gap: 6px;
    align-items: center; margin-top: 10px;
  }

  /* ── Badges ── */
  .badge {
    font-family: var(--font-mono);
    font-size: 10px; font-weight: 500;
    padding: 3px 9px; border-radius: 20px;
    border: 1px solid; letter-spacing: .5px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .badge.p-high   { background: var(--red-dim);    border-color: var(--red);    color: var(--red); }
  .badge.p-medium { background: var(--yellow-dim); border-color: var(--yellow); color: var(--yellow); }

<body>
<canvas id="confetti-canvas"></canvas>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ─── Confetti ─── */
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const pieces = Array.from({length: 90}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height - canvas.height,
    r: Math.random() * 7 + 3,
    d: Math.random() * 70 + 10,
    color: ['#00F5FF','#A855F7','#00FF88','#FFD700','#FF4455','#F472B6'][Math.floor(Math.random()*6)],
    tilt: Math.random() * 10 - 10,
    tiltAngle: 0,
    tiltSpeed: Math.random() * 0.1 + 0.05,
  }));
  let frame;
  let elapsed = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.tiltAngle += p.tiltSpeed;
      p.y += (Math.cos(p.d) + 2);
      p.x += Math.sin(elapsed * 0.01) * 0.5;
      p.tilt = Math.sin(p.tiltAngle) * 12;
      ctx.beginPath();
      ctx.lineWidth = p.r;
      ctx.strokeStyle = p.color;
      ctx.moveTo(p.x + p.tilt + p.r / 2, p.y);
      ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
      ctx.stroke();
    });
    elapsed++;
    if (elapsed < 120) { frame = requestAnimationFrame(draw); }
    else { ctx.clearRect(0, 0, canvas.width, canvas.height); }
  }
  cancelAnimationFrame(frame);
  elapsed = 0;
  draw();
}

/* ─── Sound ─── */
let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) {
    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (_audioCtx.state === 'suspended') {
    _audioCtx.resume();
  }
  return _audioCtx;
}

function playCompleteSound() {
  try {
    const ctx = getAudioCtx();
    const notes = [523.25, 659.25, 783.99, 1046.50];
    notes.forEach((freq, i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = ctx.currentTime + i * 0.13;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.22, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.start(t);
      osc.stop(t + 0.38);
    });
  } catch(e) { console.warn('Sound error:', e); }
}

function playPomoDoneSound() {
  try {
    const ctx = getAudioCtx();
    [440, 550, 660, 880].forEach((freq, i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const t = ctx.currentTime + i * 0.15;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.18, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
      osc.start(t);
      osc.stop(t + 0.48);
    });
  } catch(e) { console.warn('Sound error:', e); }
}

/* ─── Pomodoro Component ─── */
const POMO_FOCUS = 25 * 60;
const POMO_BREAK = 5 * 60;

function PomodoroBar({ tasks }) {
  const [running, setRunning]       = useState(false);
  const [mode, setMode]             = useState('focus');
  const [timeLeft, setTimeLeft]     = useState(POMO_FOCUS);
  const [rounds, setRounds]         = useState(0);
  const [activeTaskId, setActiveTaskId] = useState('');
  const intervalRef                 = useRef(null);
  const totalTime                   = mode === 'focus' ? POMO_FOCUS : POMO_BREAK;

  const activeTasks = tasks.filter(t => !t.completed);

  useEffect(() => {
    if (running) {
      intervalRef.current = setInterval(() => {
        setTimeLeft(t => {
          if (t <= 1) {
            clearInterval(intervalRef.current);
            setRunning(false);
            playPomoDoneSound();
            if (mode === 'focus') {
              setRounds(r => r + 1);
              setMode('break');
              setTimeLeft(POMO_BREAK);
            } else {
              setMode('focus');
              setTimeLeft(POMO_FOCUS);
            }
            return 0;
          }
          return t - 1;
        });
      }, 1000);
    } else {
      clearInterval(intervalRef.current);
    }
    return () => clearInterval(intervalRef.current);
  }, [running, mode]);

  function fmt(s) {
    return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  }

  function handleStart() {
    if (!running && timeLeft === 0) {
      setTimeLeft(mode === 'focus' ? POMO_FOCUS : POMO_BREAK);
    }
    setRunning(r => !r);
  }

  function handleReset() {
    setRunning(false);
    setTimeLeft(mode === 'focus' ? POMO_FOCUS : POMO_BREAK);
  }

  function handleSkip() {
    setRunning(false);
    if (mode === 'focus') { setMode('break'); setTimeLeft(POMO_BREAK); }
    else { setMode('focus'); setTimeLeft(POMO_FOCUS); setRounds(r => r + 1); }
  }

  const pct = Math.round(((totalTime - timeLeft) / totalTime) * 100);
  const activeTask = activeTasks.find(t => t.id === activeTaskId);
  const isWarning = mode === 'focus' && timeLeft <= 60 && running;

  return (
    <div className="pomo-bar" role="region" aria-label="Pomodoro Timer">
      <div style={{display:'flex',flexDirection:'column',gap:4,minWidth:0}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span className="pomo-title">⏱ Pomodoro</span>
          <span className={`pomo-mode-badge ${mode}`}>{mode === 'focus' ? 'Focus' : 'Break'}</span>
          <span className="pomo-rounds">{rounds} round{rounds !== 1 ? 's' : ''}</span>
        </div>
        {activeTask && <div className="pomo-task-name">📌 {activeTask.title}</div>}
      </div>

      <select
        value={activeTaskId}
        onChange={e => setActiveTaskId(e.target.value)}
        style={{background:'var(--bg3)',border:'1px solid var(--border)',color:'var(--text2)',fontFamily:'var(--font-mono)',fontSize:'11px',padding:'6px 10px',borderRadius:'6px',outline:'none',maxWidth:'180px'}}
        aria-label="Select task for pomodoro"
      >
        <option value="">— Select task —</option>
        {activeTasks.map(t => (
          <option key={t.id} value={t.id}>{t.title.slice(0,32)}{t.title.length>32?'…':''}</option>
        ))}
      </select>

      <div className={`pomo-display${mode==='break'?' break':''}${isWarning?' warning':''}`}>
        {fmt(timeLeft)}
      </div>

      <div style={{width:'100%',order:10}}>
        <div className="pomo-progress-bg">
          <div className="pomo-progress-fill" style={{width:`${pct}%`}} />
        </div>
      </div>

      <div className="pomo-controls">
        <button className={`pomo-btn ${running ? 'running' : ''}`} onClick={handleStart} aria-label={running ? 'Pause timer' : 'Start timer'}>
          {running ? '⏸ Pause' : '▶ Start'}
        </button>
        <button className="pomo-btn" onClick={handleReset} aria-label="Reset timer">↺ Reset</button>
        <button className="pomo-btn" onClick={handleSkip} aria-label="Skip to next phase">⏭ Skip</button>
      </div>
    </div>
  );
}

/* ─── Helpers ─── */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);

const PRIO_WEIGHT = { high: 3, medium: 2, low: 1 };

function isOverdue(t) {
  if (t.completed || !t.dueDate) return false;
  const dt = new Date(t.dueDate + (t.dueTime ? 'T' + t.dueTime : 'T23:59'));
  return dt < new Date();
}

function dueState(t) {
  if (!t.dueDate) return null;
  const dt = new Date(t.dueDate + (t.dueTime ? 'T' + t.dueTime : 'T23:59'));
  const now = new Date();
  const eod = new Date(); eod.setHours(23,59,59,999);
  if (dt < now) return 'overdue';
  if (dt <= eod) return 'today';
  return 'future';
}

function fmtDate(d, t) {
  if (!d) return '';
  const opts = { day: '2-digit', month: 'short' };
  const dt = new Date(d + (t ? 'T' + t : 'T00:00'));
  return dt.toLocaleDateString('en-GB', opts) + (t ? ' ' + t : '');
}

function fmtDone(ts) {
  return new Date(ts).toLocaleString('en-GB', {
    day: '2-digit', month: 'short',
    hour: '2-digit', minute: '2-digit'
  });
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

const SAMPLE_TASKS = [];

/* ─── Clock ─── */
function Clock() {
  const [t, setT] = useState(new Date());
  useEffect(() => { const id = setInterval(() => setT(new Date()), 1000); return () => clearInterval(id); }, []);
  return (
    <div className="clock">
      {t.toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short'})}
      {' · '}
      {t.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}
    </div>
  );
}

/* ─── Task Form ─── */
function TaskForm({ initial, onSave, onClose }) {
  const isEdit = !!initial;
  const [title, setTitle]   = useState(initial?.title    || '');
  const [desc, setDesc]     = useState(initial?.desc     || '');
  const [priority, setPri]  = useState(initial?.priority || '');
  const [category, setCat]  = useState(initial?.category || '');
  const [dueDate, setDate]  = useState(initial?.dueDate  || '');
  const [dueTime, setTime]  = useState(initial?.dueTime  || '');
  const [errs, setErrs]     = useState({});
  const titleRef            = useRef();

  useEffect(() => { titleRef.current?.focus(); }, []);

  useEffect(() => {
    const handler = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [onClose]);

  function validate() {
    const e = {};
    if (!title.trim()) e.title = 'Title is required';
    if (!priority)     e.priority = 'Select a priority';
    if (!category)     e.category = 'Select a category';
    setErrs(e);
    return Object.keys(e).length === 0;
  }

  function handleSubmit(ev) {
    ev && ev.preventDefault();
    if (!validate()) return;
    onSave({ title: title.trim(), desc: desc.trim(), priority, category, dueDate, dueTime });
  }

  return (
    <div className="form-backdrop" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="form-card" role="dialog" aria-modal="true" aria-label={isEdit ? 'Edit task' : 'Add new task'}>
        <div className="form-header">
          <span className="form-title-text">// {isEdit ? 'EDIT TASK' : 'ADD NEW TASK'}</span>
          <button className="btn-close" onClick={onClose} aria-label="Close form">✕</button>
        </div>
        <div className="form-grid">
          <div className="form-group form-full">
            <label htmlFor="f-title">Task Title *</label>
            <input
              id="f-title"
              ref={titleRef}
              type="text"
              placeholder="What needs to be done?"
              value={title}
              onChange={e => setTitle(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) handleSubmit(); }}
            />
            {errs.title && <span className="err-msg">{errs.title}</span>}
          </div>
          <div className="form-group form-full">
            <label htmlFor="f-desc">Description</label>
            <textarea
              id="f-desc"
              placeholder="Optional notes..."
              value={desc}
              onChange={e => setDesc(e.target.value)}
            />
          </div>
          <div className="form-group">
            <label htmlFor="f-priority">Priority *</label>
            <select id="f-priority" value={priority} onChange={e => setPri(e.target.value)}>
              <option value="">-- Select --</option>
              <option value="high">🔴 High</option>
              <option value="medium">🟡 Medium</option>
              <option value="low">🔵 Low</option>
            </select>
            {errs.priority && <span className="err-msg">{errs.priority}</span>}
          </div>
          <div className="form-group">
            <label htmlFor="f-category">Category *</label>
            <select id="f-category" value={category} onChange={e => setCat(e.target.value)}>
              <option value="">-- Select --</option>
              <option value="work">💼 Work</option>
              <option value="study">📚 Study</option>
              <option value="personal">🙂 Personal</option>
              <option value="health">💪 Health</option>
              <option value="finance">💰 Finance</option>
              <option value="other">⚙️ Other</option>
            </select>
            {errs.category && <span className="err-msg">{errs.category}</span>}
          </div>
          <div className="form-group">
            <label htmlFor="f-date">Due Date</label>
            <input id="f-date" type="date" value={dueDate} onChange={e => setDate(e.target.value)} />
          </div>
          <div className="form-group">
            <label htmlFor="f-time">Due Time</label>
            <input id="f-time" type="time" value={dueTime} onChange={e => setTime(e.target.value)} />
          </div>
        </div>
        <div className="form-actions">
          <button className="btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn-save" onClick={handleSubmit}>
            {isEdit ? '✓ Update Task' : '+ Save Task'}
          </button>
        </div>
        <div style={{textAlign:'center',marginTop:10}}>
          <span style={{fontFamily:'var(--font-mono)',fontSize:'10px',color:'var(--text3)'}}>Ctrl+Enter to save · Esc to close</span>
        </div>
      </div>
    </div>
  );
}

/* ─── TaskCard ─── */
function TaskCard({ task, selected, onToggle, onEdit, onDup, onDelete, onSelect, onPin, dragging, dragOver, onDragStart, onDragEnd, onDragOver, onDrop }) {
  const ds = dueState(task);
  const overdue = isOverdue(task);
  const pClass = `p-${task.priority}`;
  const cardCls = [
    'task-card', pClass,
    task.completed ? 'is-completed' : '',
    task.pinned ? 'pinned' : '',
    selected ? 'selected' : '',
    dragging ? 'dragging' : '',
    dragOver ? 'drag-over' : '',
  ].filter(Boolean).join(' ');

  return (
    <div
      className={cardCls}
      draggable
      onDragStart={onDragStart}
      onDragEnd={onDragEnd}
      onDragOver={e => { e.preventDefault(); onDragOver(); }}
      onDrop={e => { e.preventDefault(); onDrop(); }}
      onClick={e => {
        if (e.target.closest('button') || e.target.closest('.task-checkbox')) return;
        onSelect();
      }}
      role="listitem"
    >
      <div className="task-top">
        <div className="task-checkbox-wrap">
          <div
            className={`task-checkbox ${task.completed ? 'checked' : ''}`}
            role="checkbox"
            aria-checked={task.completed}
            tabIndex={0}
            onClick={e => { e.stopPropagation(); onToggle(); }}
            onKeyDown={e => { if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); onToggle(); } }}
            title={task.completed ? 'Mark as active' : 'Mark as complete'}
          >
            <svg width="11" height="9" viewBox="0 0 11 9" fill="none">
              <path d="M1 4.5L4 7.5L10 1" stroke="#0B0F17" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </div>
        </div>
        <div className="task-body">
          <div className="task-title">{task.title}</div>
          {task.desc && <div className="task-desc">{task.desc}</div>}
          <div className="task-meta">
            <span className={`badge p-${task.priority}`}>{task.priority}</span>
            <span className={`badge cat-${task.category}`}>{task.category}</span>
            {task.dueDate && (
              <span className={`due-badge due-${ds}`}>
                📅 {fmtDate(task.dueDate, task.dueTime)}
                {overdue && ' · OVERDUE'}
                {ds === 'today' && !overdue && ' · TODAY'}
              </span>
            )}
            {task.completed && task.completedAt && (
              <span className="done-time">✓ Done {fmtDone(task.completedAt)}</span>
            )}
          </div>
        </div>
        <div className="task-actions" aria-label="Task actions">
          <button className={`act-btn pin-btn${task.pinned ? ' pinned' : ''}`} title={task.pinned ? 'Unpin task' : 'Pin task'} onClick={e => { e.stopPropagation(); onPin(); }} aria-label={task.pinned ? 'Unpin task' : 'Pin task'}>📌</button>
          <button className="act-btn done-btn" title={task.completed ? 'Mark active' : 'Mark complete'} onClick={e => { e.stopPropagation(); onToggle(); }} aria-label={task.completed ? 'Mark active' : 'Mark complete'}>
            {task.completed ? '↩' : '✓'}
          </button>
          <button className="act-btn edit-btn" title="Edit" onClick={e => { e.stopPropagation(); onEdit(); }} aria-label="Edit task">✎</button>
          <button className="act-btn dup-btn" title="Duplicate" onClick={e => { e.stopPropagation(); onDup(); }} aria-label="Duplicate task">⎘</button>
          <button className="act-btn del-btn" title="Delete" onClick={e => { e.stopPropagation(); onDelete(); }} aria-label="Delete task">✕</button>
        </div>
      </div>
    </div>
  );
}

/* ─── localStorage helpers ─── */
const LS_KEY = 'cybertask_v1_tasks';
function loadTasks() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return [];
}
function saveTasks(tasks) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(tasks)); } catch(e) {}
}

/* ─── Main App ─── */
function App() {
  const [tasks, setTasksRaw]      = useState(() => loadTasks());
  const [showForm, setShowForm]   = useState(false);
  const [editTask, setEditTask]   = useState(null);
  const [selectedIds, setSelIds]  = useState(new Set());
  const [search, setSearch]       = useState('');
  const [sortBy, setSortBy]       = useState('created');
  const [statusF, setStatusF]     = useState('all');
  const [priorityF, setPriorityF] = useState(new Set());
  const [catF, setCatF]           = useState(new Set());
  const [dragSrcId, setDragSrcId] = useState(null);
  const [dragOverId, setDragOverId] = useState(null);
  const [selectAll, setSelectAll] = useState(false);
  const [saveIndicator, setSaveIndicator] = useState(false);

  /* ── Auto-save to localStorage on every tasks change ── */
  function setTasks(val) {
    setTasksRaw(prev => {
      const next = typeof val === 'function' ? val(prev) : val;
      saveTasks(next);
      setSaveIndicator(true);
      setTimeout(() => setSaveIndicator(false), 1200);
      return next;
    });
  }

  /* ── Stats ── */
  const total   = tasks.length;
  const done    = tasks.filter(t => t.completed).length;
  const overdue = tasks.filter(t => isOverdue(t)).length;
  const pending = total - done - overdue;
  const rate    = total ? Math.round((done / total) * 100) : 0;

  /* ── Filtered + Sorted list ── */
  const visible = (() => {
    let list = [...tasks];
    if (search.trim()) {
      const q = search.trim().toLowerCase();
      list = list.filter(t =>
        t.title.toLowerCase().includes(q) ||
        t.category.toLowerCase().includes(q) ||
        (t.desc || '').toLowerCase().includes(q)
      );
    }
    if (statusF === 'active')    list = list.filter(t => !t.completed && !isOverdue(t));
    if (statusF === 'completed') list = list.filter(t => t.completed);
    if (statusF === 'overdue')   list = list.filter(t => isOverdue(t));
    if (priorityF.size) list = list.filter(t => priorityF.has(t.priority));
    if (catF.size)      list = list.filter(t => catF.has(t.category));

    list.sort((a, b) => {
      if (sortBy === 'due-asc') {
        if (!a.dueDate && !b.dueDate) return 0;
        if (!a.dueDate) return 1; if (!b.dueDate) return -1;
        return new Date(a.dueDate + (a.dueTime ? 'T'+a.dueTime : '')) - new Date(b.dueDate + (b.dueTime ? 'T'+b.dueTime : ''));
      }
      if (sortBy === 'due-desc') {
        if (!a.dueDate && !b.dueDate) return 0;
        if (!a.dueDate) return 1; if (!b.dueDate) return -1;
        return new Date(b.dueDate + (b.dueTime ? 'T'+b.dueTime : '')) - new Date(a.dueDate + (a.dueTime ? 'T'+a.dueTime : ''));
      }
      if (sortBy === 'priority-desc') return PRIO_WEIGHT[b.priority] - PRIO_WEIGHT[a.priority];
      if (sortBy === 'priority-asc')  return PRIO_WEIGHT[a.priority] - PRIO_WEIGHT[b.priority];
      if (sortBy === 'alpha') return a.title.localeCompare(b.title);
      return b.createdAt - a.createdAt;
    });
    return list;
  })();

  /* ── Handlers ── */
  function toggleTask(id) {
    const task = tasks.find(t => t.id === id);
    const completing = task && !task.completed;
    if (completing) {
      playCompleteSound();
      launchConfetti();
    }
    setTasks(ts => ts.map(t => t.id === id
      ? { ...t, completed: !t.completed, completedAt: !t.completed ? Date.now() : null }
      : t
    ));
  }

  function deleteTask(id) {
    setTasks(ts => ts.filter(t => t.id !== id));
    setSelIds(s => { const n = new Set(s); n.delete(id); return n; });
  }

  function dupTask(id) {
    setTasks(ts => {
      const idx = ts.findIndex(t => t.id === id);
      const copy = { ...ts[idx], id: uid(), title: ts[idx].title + ' (copy)', completed: false, completedAt: null, createdAt: Date.now() };
      const next = [...ts];
      next.splice(idx + 1, 0, copy);
      return next;
    });
  }

  function openEdit(task) { setEditTask(task); setShowForm(true); }

  function handleSave(data) {
    if (editTask) {
      setTasks(ts => ts.map(t => t.id === editTask.id ? { ...t, ...data } : t));
    } else {
      setTasks(ts => [{ id: uid(), ...data, completed: false, createdAt: Date.now(), completedAt: null }, ...ts]);
    }
    setShowForm(false); setEditTask(null);
  }

  function closeForm() { setShowForm(false); setEditTask(null); }

  function pinTask(id) {
    setTasks(ts => ts.map(t => t.id === id ? { ...t, pinned: !t.pinned } : t));
  }

  function toggleSelect(id) {
    setSelIds(s => {
      const n = new Set(s);
      if (n.has(id)) n.delete(id); else n.add(id);
      return n;
    });
  }

  function handleSelectAll(v) {
    setSelectAll(v);
    if (v) setSelIds(new Set(visible.map(t => t.id)));
    else   setSelIds(new Set());
  }

  function bulkComplete() {
    setTasks(ts => ts.map(t => selectedIds.has(t.id) ? { ...t, completed: true, completedAt: Date.now() } : t));
    setSelIds(new Set()); setSelectAll(false);
  }

  function bulkDelete() {
    setTasks(ts => ts.filter(t => !selectedIds.has(t.id)));
    setSelIds(new Set()); setSelectAll(false);
  }

  function clearDone() {
    setTasks(ts => ts.filter(t => !t.completed));
    setSelIds(new Set()); setSelectAll(false);
  }

  /* ── Priority filter toggle ── */
  function togglePriority(p) {
    setPriorityF(s => { const n = new Set(s); if (n.has(p)) n.delete(p); else n.add(p); return n; });
  }
  function toggleCat(c) {
    setCatF(s => { const n = new Set(s); if (n.has(c)) n.delete(c); else n.add(c); return n; });
  }

  /* ── Drag & Drop ── */
  function handleDrop(targetId) {
    if (!dragSrcId || dragSrcId === targetId) { setDragSrcId(null); setDragOverId(null); return; }
    setTasks(ts => {
      const arr = [...ts];
      const srcIdx = arr.findIndex(t => t.id === dragSrcId);
      const tgtIdx = arr.findIndex(t => t.id === targetId);
      const [moved] = arr.splice(srcIdx, 1);
      arr.splice(tgtIdx, 0, moved);
      return arr;
    });
    setDragSrcId(null); setDragOverId(null);
  }

  /* ── Keyboard: open form on N ── */
  useEffect(() => {
    const h = e => {
      if ((e.key === 'n' || e.key === 'N') && !showForm && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
        setShowForm(true);
      }
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [showForm]);

  /* ── Empty state messages ── */
  function EmptyState() {
    if (tasks.length === 0) return (
      <div className="empty">
        <span className="empty-icon">⬡</span>
        <div className="empty-title">Your Task Board is Ready</div>
        <div className="empty-sub" style={{maxWidth:'380px',margin:'0 auto',lineHeight:'1.8'}}>
          Begin by adding your first task. Click <strong style={{color:'var(--cyan)'}}>NEW TASK</strong> above or press&nbsp;<strong style={{color:'var(--purple)'}}>N</strong> on your keyboard to get started. Stay organised, stay ahead.
        </div>
      </div>
    );
    if (tasks.every(t => t.completed)) return (
      <div className="empty">
        <span className="empty-icon">◈</span>
        <div className="empty-title">All systems nominal</div>
        <div className="empty-sub">// All tasks complete — mission accomplished</div>
      </div>
    );
    return (
      <div className="empty">
        <span className="empty-icon">⬙</span>
        <div className="empty-title">No matching tasks</div>
        <div className="empty-sub">// Adjust filters or search query</div>
      </div>
    );
  }

  return (
    <div className="app">
      {/* ─── Header ─── */}
      <header className="header">
        <div className="header-left">
          <div className="logo" aria-hidden="true">CT</div>
          <div>
            <h1 className="app-title">CyberTask</h1>
            <div className="app-sub">// PERSONAL PRODUCTIVITY SYSTEM v1.1 · AUTO-SAVED</div>
          </div>
        </div>
        <div className="header-right">
          {saveIndicator && (
            <span style={{fontFamily:'var(--font-mono)',fontSize:'10px',color:'var(--green)',letterSpacing:'1px',opacity:.8}}>
              ✓ Saved
            </span>
          )}
          <Clock />
          <button className="btn-primary" onClick={() => setShowForm(true)} aria-label="Add new task">
            ＋ NEW TASK
          </button>
        </div>
      </header>

      {/* ─── Stats ─── */}
      <div className="stats-grid" role="region" aria-label="Dashboard statistics">
        <div className="stat-card total">
          <div className="stat-label">Total</div>
          <div className="stat-val">{total}</div>
          <span className="stat-icon" aria-hidden="true">◈</span>
        </div>
        <div className="stat-card done">
          <div className="stat-label">Done</div>
          <div className="stat-val">{done}</div>
          <span className="stat-icon" aria-hidden="true">✓</span>
        </div>
        <div className="stat-card pending">
          <div className="stat-label">Pending</div>
          <div className="stat-val">{Math.max(0, pending)}</div>
          <span className="stat-icon" aria-hidden="true">◷</span>
        </div>
        <div className="stat-card overdue">
          <div className="stat-label">Overdue</div>
          <div className="stat-val">{overdue}</div>
          <span className="stat-icon" aria-hidden="true">⚠</span>
        </div>
        <div className="stat-card rate">
          <div className="stat-label">Rate</div>
          <div className="stat-val">{rate}%</div>
          <span className="stat-icon" aria-hidden="true">▲</span>
        </div>
      </div>

      {/* ─── Progress Bar ─── */}
      <div className="progress-wrap" role="progressbar" aria-valuenow={rate} aria-valuemin={0} aria-valuemax={100} aria-label="Completion rate">
        <span className="progress-label">Completion</span>
        <div className="progress-bar-bg">
          <div className="progress-bar-fill" style={{ width: `${rate}%` }} />
        </div>
        <span className="progress-pct">{rate}%</span>
      </div>

      {/* ─── Pomodoro ─── */}
      <PomodoroBar tasks={tasks} />

      {/* ─── Toolbar ─── */}
      <div className="toolbar">
        <div className="search-wrap">
          <span className="search-icon" aria-hidden="true">🔍</span>
          <input
            className="search-input"
            type="text"
            placeholder="Search by title, category, or description..."
            value={search}
            onChange={e => setSearch(e.target.value)}
            aria-label="Search tasks"
          />
        </div>
        <select className="sort-select" value={sortBy} onChange={e => setSortBy(e.target.value)} aria-label="Sort tasks">
          <option value="created">Sort: Created</option>
          <option value="due-asc">Due: Nearest First</option>
          <option value="due-desc">Due: Latest First</option>
          <option value="priority-desc">Priority: High → Low</option>
          <option value="priority-asc">Priority: Low → High</option>
          <option value="alpha">A → Z</option>
        </select>
      </div>

      {/* ─── Filters ─── */}
      <div className="filter-section" role="group" aria-label="Filter tasks">
        <div className="filter-row">
          <span className="filter-label">Status:</span>
          {['all','active','completed','overdue'].map(s => (
            <button key={s} className={`chip${statusF === s ? ' active' : ''}`} onClick={() => setStatusF(s)} aria-pressed={statusF === s}>
              {s.charAt(0).toUpperCase() + s.slice(1)}
            </button>
          ))}
        </div>
        <div className="filter-row">
          <span className="filter-label">Priority:</span>
          {['high','medium','low'].map(p => (
            <button key={p} className={`chip${priorityF.has(p) ? ` active p-${p}` : ''}`} onClick={() => togglePriority(p)} aria-pressed={priorityF.has(p)}>
              {p.charAt(0).toUpperCase() + p.slice(1)}
            </button>
          ))}
        </div>
        <div className="filter-row">
          <span className="filter-label">Category:</span>
          {['work','study','personal','health','finance','other'].map(c => (
            <button key={c} className={`chip${catF.has(c) ? ' active' : ''}`} onClick={() => toggleCat(c)} aria-pressed={catF.has(c)}>
              {c.charAt(0).toUpperCase() + c.slice(1)}
            </button>
          ))}
        </div>
      </div>

      {/* ─── Bulk Actions ─── */}
      {selectedIds.size > 0 && (
        <div className="bulk-row" role="toolbar" aria-label="Bulk actions">
          <span className="bulk-info">{selectedIds.size} task{selectedIds.size > 1 ? 's' : ''} selected</span>
          <button className="bulk-btn complete" onClick={bulkComplete}>✓ Complete</button>
          <button className="bulk-btn remove" onClick={bulkDelete}>✕ Delete</button>
          <button className="bulk-btn clear" onClick={clearDone}>⊠ Clear Done</button>
        </div>
      )}

      {/* ─── Select All ─── */}
      <div className="select-all-row">
        <input
          type="checkbox"
          id="select-all"
          checked={selectAll}
          onChange={e => handleSelectAll(e.target.checked)}
          aria-label="Select all visible tasks"
        />
        <label htmlFor="select-all">Select all visible ({visible.length})</label>
        <span style={{marginLeft:'auto',fontFamily:'var(--font-mono)',fontSize:'10px',color:'var(--text3)'}}>
          Press N to add · Drag to reorder
        </span>
      </div>

      {/* ─── Task List ─── */}
      {visible.length === 0 ? (
        <EmptyState />
      ) : (() => {
        const pinned  = visible.filter(t => t.pinned);
        const regular = visible.filter(t => !t.pinned);
        const renderCard = task => (
          <TaskCard
            key={task.id}
            task={task}
            selected={selectedIds.has(task.id)}
            dragging={dragSrcId === task.id}
            dragOver={dragOverId === task.id}
            onToggle={() => toggleTask(task.id)}
            onEdit={() => openEdit(task)}
            onDup={() => dupTask(task.id)}
            onDelete={() => deleteTask(task.id)}
            onSelect={() => toggleSelect(task.id)}
            onPin={() => pinTask(task.id)}
            onDragStart={() => setDragSrcId(task.id)}
            onDragEnd={() => { setDragSrcId(null); setDragOverId(null); }}
            onDragOver={() => setDragOverId(task.id)}
            onDrop={() => handleDrop(task.id)}
          />
        );
        return (
          <div className="task-list" role="list" aria-label="Tasks">
            {pinned.length > 0 && (
              <>
                <div className="pin-section-label">📌 Pinned Tasks</div>
                {pinned.map(renderCard)}
                {regular.length > 0 && <div className="pin-section-label" style={{color:'var(--text3)',marginTop:4}}>All Tasks</div>}
              </>
            )}
            {regular.map(renderCard)}
          </div>
        );
      })()}

      {/* ─── Form Modal ─── */}
      {showForm && (
        <TaskForm
          initial={editTask}
          onSave={handleSave}
          onClose={closeForm}
        />
      )}
    </div>
  );
}

function Footer() {
  return (
    <footer style={{
      textAlign: 'center',
      padding: '32px 20px 20px',
      borderTop: '1px solid var(--border3)',
      marginTop: '40px',
    }}>
      <div style={{
        fontFamily: 'var(--font-mono)',
        fontSize: '12px',
        color: 'var(--text3)',
        letterSpacing: '1px',
      }}>
        <span style={{color:'var(--border)'}}>// </span>
        Designed &amp; Developed by{' '}
        <span style={{
          color: 'var(--cyan)',
          fontWeight: '600',
          letterSpacing: '1.5px',
        }}>
          Md. Ashrafujjaman Rafi
        </span>
      </div>
      <div style={{
        fontFamily: 'var(--font-mono)',
        fontSize: '10px',
        color: 'var(--text3)',
        marginTop: '6px',
        letterSpacing: '.8px',
        opacity: '.6',
      }}>
        CyberTask v1.1 · Personal Productivity Dashboard
      </div>
    </footer>
  );
}

/* ─── Warm up AudioContext on first interaction ─── */
document.addEventListener('click', () => { getAudioCtx(); }, { once: true });

function Root() {
  return (
    <>
      <App />
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
